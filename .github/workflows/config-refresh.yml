name: Trigger Config Refresh

on:
  push:
    branches: [main]
    paths: ['config-repo/**']
  workflow_dispatch:
    inputs:
      config_server_url:
        description: 'Config Server URL'
        required: false
        default: 'http://localhost:8888'
        type: string

jobs:
  notify-config-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Config Server Monitor
        env:
          CONFIG_SERVER_URL: ${{ github.event.inputs.config_server_url || secrets.CONFIG_SERVER_URL || 'http://localhost:8888' }}
        run: |
          echo "Triggering config refresh at: $CONFIG_SERVER_URL"
          
          # Extract modified files from the git commit
          MODIFIED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD | grep "^config-repo/" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          
          # If no files detected (e.g., manual trigger), refresh all config files
          if [ -z "$MODIFIED_FILES" ] || [ "$MODIFIED_FILES" == "[]" ]; then
            MODIFIED_FILES='["config-repo/application.yml","config-repo/config-client-1.yml","config-repo/config-client-2.yml"]'
          fi
          
          echo "Modified files: $MODIFIED_FILES"
          
          # Send webhook payload to /monitor endpoint
          RESPONSE=$(curl -X POST "$CONFIG_SERVER_URL/monitor" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "{\"commits\":[{\"modified\":$MODIFIED_FILES}]}" \
            --write-out "\n%{http_code}" \
            --silent \
            --show-error)
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          APPS=$(echo "$RESPONSE" | head -n1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Applications to refresh: $APPS"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to trigger config refresh"
            exit 1
          fi
      
      - name: Wait for propagation
        run: sleep 5

      - name: Verify client health
        run: |
          echo "Checking client apps..."
          curl -s http://localhost:8080/actuator/health || echo "Client 1 not available"
          curl -s http://localhost:8081/actuator/health || echo "Client 2 not available"
