server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        # Git-based configuration (recommended for production)
        # The URI should point to this repository when deployed to GitHub
        git:
          uri: ${CONFIG_GIT_URI:file://./config-repo}
          default-label: main
          search-paths: config-repo
          timeout: 10
          refresh-rate: 30
        # Native filesystem-based configuration (for local development without Git)
        # Uncomment below and comment out git above to use local files instead of Git
        # native:
        #   search-locations: ${CONFIG_REPO_PATH:file:./config-repo}
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        service-name: ${spring.application.name}
        prefer-ip-address: false
    bus:
      destination: my-config-bus
      id: ${spring.application.name}
      enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,refresh,busenv,monitor,info
  endpoint:
    health:
      show-details: always
    monitor:
      enabled: true
    busenv:
      enabled: true
    refresh:
      enabled: true

logging:
  level:
    root: INFO
    org.springframework.cloud: DEBUG
    org.springframework.boot: INFO
